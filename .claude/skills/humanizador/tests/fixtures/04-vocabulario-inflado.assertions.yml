description: |
  Texto com palavras-tell, fórmulas "É importante", impessoal inflado,
  atribuições vagas e anglicismos. banned_phrases usa frases inteiras
  (não palavras isoladas tipo "crucial" ou "paradigma") porque essas
  palavras aparecem legitimamente em pt-BR humano. O tique vive na
  combinação ("paradigma atual", "É crucial entender"), não na palavra.
banned_phrases:
  - "É crucial entender"
  - "paradigma atual"
  - "ecossistema digital"
  - "abordagem holística"
  - "resultados robustos"
  - "É importante ressaltar"
  - "Vale destacar que"
  - "Faz-se necessário"
  - "Cumpre observar"
  - "Especialistas afirmam"
  - "analistas destacam"
  - "insights valiosos"
  - "mindset inovador"
  - "alavancando insights"
  - "futuro se mostra promissor"
required_paragraph_count_min: 2
