description: |
  Texto sintético com densidade de travessões equivalente à edição 260428
  reportada na #28 (10 travessões em 16 parágrafos, ~62% dos parágrafos com
  pelo menos 1). O fixture motiva validação da meta da 1.4.0 (≤ 1 a cada
  3-4 parágrafos). Conteúdo é editorial/noticioso, com mix de remates,
  apostos curtos e substituição de conector e dois-pontos.
travessoes_max: 5  # meta da 1.4.0: ≤ 1 a cada 3-4 parágrafos × 16 parágrafos
required_paragraph_count_min: 10
min_chars: 1500
banned_phrases:
  - "Em suma"
  - "Por fim, mas não menos importante"
  - "fica claro que"
