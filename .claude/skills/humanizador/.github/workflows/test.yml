name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate skill + markdown
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install --quiet pyyaml==6.0.2

      - name: Validate SKILL.md frontmatter and README consistency
        run: python3 scripts/validate_skill.py

      - name: Check internal Markdown links
        run: python3 scripts/check_internal_links.py

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            #node_modules

  external-links:
    name: external links (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            README.md SKILL.md WARP.md CONTRIBUTING.md
          fail: true
