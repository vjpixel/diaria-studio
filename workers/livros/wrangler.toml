# workers/livros — hosting da página piloto "Livros sobre IA" (#1744).
#
# Worker de static assets (sem script): serve workers/livros/public/index.html
# em https://livros.diar.ia.br/ (domínio de marca, #3698) — também acessível
# via https://livros.diaria.workers.dev/ (mantido por compat de links já
# enviados em edições passadas). O HTML é gerado por
# `scripts/build-livros-page.ts` a partir de `seed/books/livros-ia.json`
# (fonte de verdade, versionada). REGENERAR antes do deploy quando o seed mudar:
#
#   npx tsx scripts/build-livros-page.ts --out workers/livros/public/index.html
#   cd workers/livros && npx wrangler deploy
#
# O teste `test/livros-asset-drift.test.ts` garante que o HTML committed reflete
# o seed (CI falha se alguém editar o seed sem regenerar).
name = "livros"
compatibility_date = "2024-09-23"
workers_dev = true

# #3698: domínio de marca (livros.diar.ia.br). workers_dev = true continua
# ativo — links já enviados em edições passadas apontam pra
# livros.diaria.workers.dev e precisam continuar vivos.
[[routes]]
pattern = "livros.diar.ia.br"
custom_domain = true

[assets]
directory = "./public"
