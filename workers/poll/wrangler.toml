name = "poll"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[kv_namespaces]]
binding = "POLL"
id = "72784da4ae39444481eb422ebac357c6"

# #2187: Durable Object para serialização de dedup de voto por email.
# Elimina a race read-modify-write que o KV eventual-consistent expunha.
# Classe `VoteDedup` exportada de src/vote-dedup.ts (re-exportada por index.ts).
[[durable_objects.bindings]]
name = "VOTE_DEDUP"
class_name = "VoteDedup"

# #2223: Durable Object para serialização do contador stats edition-wide.
# Elimina a race read-modify-write em stats:{edition} — sob burst, requests
# concorrentes perdiam incrementos ao ler o mesmo valor stale no KV.
# Instanciado por {brand}:{edition} — brand incluído para isolamento diaria×clarice.
# Classe `StatsCounter` exportada de src/stats-counter.ts (re-exportada por index.ts).
[[durable_objects.bindings]]
name = "STATS_COUNTER"
class_name = "StatsCounter"

# Migration obrigatória para new_sqlite_classes (#2187, #2236).
# Ao deploying pela primeira vez: wrangler deploy cria os namespaces DO
# automaticamente. Não é necessário nenhuma ação manual além do deploy.
# NÃO deployar sem esta migration — a ausência dela causaria erro 1102 do CF
# ("No such binding" para DurableObjectNamespace) ao tentar usar o namespace.
[[migrations]]
tag = "v1-vote-dedup"
# Free plan do Cloudflare exige DO com storage SQLite (new_sqlite_classes),
# não new_classes (KV-backed, só plano pago) — erro 10097 no deploy. O
# state.storage API é idêntico; nenhuma mudança de código no DO (#2236).
new_sqlite_classes = ["VoteDedup"]

# Migration para StatsCounter (#2223). Tag separada de v1 — migration tags são
# cumulativas no CF; nova tag cobre apenas a classe nova. NÃO deployar sem isto.
[[migrations]]
tag = "v2-stats-counter"
new_sqlite_classes = ["StatsCounter"]

# Nota (#2187 finding #3): não há seção [env.staging] neste wrangler.toml.
# O projeto poll não usa um ambiente staging separado — testes de integração
# rodam via miniflare/Node (sem binding DO real). Se um env staging for
# adicionado no futuro, DEVE incluir o binding VOTE_DEDUP e a [[migrations]]
# abaixo, caso contrário `wrangler deploy --env staging` omitirá o binding
# silenciosamente e cairá no path KV racy (race condition do #2187).
# NÃO deployar sem esse bloco em qualquer env que use VOTE_DEDUP.

[vars]
ALLOWED_ORIGINS = "https://diar.ia.br,https://diaria.beehiiv.com"

# #3521: allowlist de origens autorizadas a embutir GET /embed dentro de um
# <iframe> (CSP frame-ancestors, ver workers/poll/src/embed.ts). VAZIO =
# ninguém autorizado (fail-closed) — configurar aqui quando o 1º parceiro
# (Clarice.ai, sugestão do EPIC #3514) for ativado, com a origem HTTPS
# completa do site dele (ex: "https://clarice.ai"). Formato: mesma convenção
# CSV de ALLOWED_ORIGINS acima. NUNCA usar "*" aqui — abriria o widget pra
# QUALQUER site embutir (superfície de clickjacking), contrário ao mandato
# explícito da issue #3521 ("não abrir iframe pro mundo").
EMBED_ALLOWED_ORIGINS = ""

# #1077 superseded por #1345: cron de reset removido. Leaderboard agora é
# indexado por publication date (score-by-month:{YYYY-MM}:{email}); reset
# não é mais necessário — meses são naturalmente isolados.

# Build step (#3111, mesmo padrão do brevo-dashboard #2107): gera
# ds-tokens.generated.ts a partir de scripts/lib/shared/design-tokens.ts antes
# de compilar o Worker. Antes disto, index.ts/leaderboard-routes.ts duplicavam
# os valores de cor/fonte do DS inline (comentários "#1936 DS canônico") sem
# trava contra divergência futura — ver test/poll-ds-tokens.test.ts.
[build]
command = "npx tsx ../../scripts/generate-worker-tokens.ts --out-dir workers/poll/src"
