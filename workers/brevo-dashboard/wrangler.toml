name = "clarice-dashboard"
main = "src/index.ts"
compatibility_date = "2026-01-01"
workers_dev = true

# Secrets (via `wrangler secret put`):
#   BREVO_API_KEY   → API key da conta Brevo da Clarice (xkeysib-...)
#   STRIPE_API_KEY  → chave restrita Stripe (read-only: Coupons/Customers/
#                     Invoices/Subscriptions/Charges = Read). Necessária para
#                     a tab de cupons (#2718). Nunca committed.
#                     Setup: wrangler secret put STRIPE_API_KEY
#
# Dashboard protegido por cookie-token — ver docs/clarice-dashboard-access-setup.md.

# Variáveis de ambiente (não-secretas). Secrets acima via wrangler secret put.
[vars]
# AUTH_TOKEN: set as a Worker secret (not a var) — wrangler secret put AUTH_TOKEN
# Generate a strong token: openssl rand -hex 32
# If unset, access is fail-CLOSED (#2748): the dashboard denies everyone — never bypassed/open.
# Tab de uso de cupons Stripe (#2718). Dados populados via MCP externo → KV
# (coupons:usage). STRIPE_API_KEY é opcional — KV tem prioridade.
# Ver docs/clarice-dashboard-access-setup.md para refresh dos dados.
COUPONS_TAB_ENABLED = "true"

# KV namespace para cache de stats imutáveis (#2144).
# id = namespace criado pelo coordenador via `wrangler kv:namespace create STATS_CACHE`.
[[kv_namespaces]]
binding = "STATS_CACHE"
id = "2f87d65d735c499ab8f465774d0167e2"
preview_id = "2f87d65d735c499ab8f465774d0167e2" # mesma namespace -- ok para dev local

# Build step (#2107): gera ds-tokens.generated.ts a partir de design-tokens.ts
# antes de compilar o Worker. Garante que tokens nunca ficam stale no bundle.
# `npx tsx ../../scripts/generate-worker-tokens.ts` lê a fonte canônica no
# repo raiz e escreve src/ds-tokens.generated.ts aqui no worker.
[build]
command = "npx tsx ../../scripts/generate-worker-tokens.ts"

# #3079: Cron Trigger — roda scheduled() pra pré-computar o fetch pesado de
# campanhas Brevo (fetchRecentCampaigns/fetchScheduledCampaigns, ~100+
# chamadas com cache frio) FORA do request-time, gravando em
# `dash:lastgood:campaigns` (KV). A rota `/` passa a ler dessa chave por padrão;
# `?fresh=1` bypassa e mantém o fetch ao vivo (debug). Decisão original do
# editor #3079: dado stale é aceitável, dado o padrão já usado por
# cohorts/contatos/MV/cupons/É IA? (todos pré-computados via KV). Free tier
# Cloudflare (até 3 crons).
#
# #3256: intervalo revisado de 10min → 3h (editor: 10min era mais frequente do
# que o necessário pra dado que só é lido, nunca usado pra decisão em tempo
# real). Se este valor mudar de novo, atualizar TAMBÉM `CRON_INTERVAL_HOURS`
# em src/types.ts — o Worker não lê `crons` em runtime, então o texto exibido
# ao editor ("atualizado às X / próxima: ~Y") depende dessa constante ficar em
# sincronia manual com o valor abaixo.
[triggers]
crons = ["0 */3 * * *"]
