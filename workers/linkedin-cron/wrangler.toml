name = "diaria-linkedin-cron"
main = "src/index.ts"
compatibility_date = "2026-01-01"
workers_dev = true

# KV namespace pra fila de posts agendados.
# Criar com: wrangler kv:namespace create LINKEDIN_QUEUE
# Cole o ID retornado abaixo:
[[kv_namespaces]]
binding = "LINKEDIN_QUEUE"
id = "4d6bb6a2bc864ea29dc15c2083806b2e"

# Cron trigger — a cada 5 minutos.
# Histórico: PR #1167 mudou pra */3 como mitigação de lag observado no #1146
# (Cloudflare cron tem SLA "~5min" mas lagou 10-15min em 2026-05-12). Decisão
# 2026-05-12 (Pixel): voltar pra */5 pra preservar margem do KV list free-tier
# (1k/day): */3 = 480/day = ~50% do limite, próximo demais. */5 = 288/day = ~30%.
# Latência aceitável até #1168 (Durable Object alarms — real fix item-specific).
# Workaround pra lag em edições críticas: POST /fire-now (auth).
# Ao disparar, lê itens com scheduled_at <= now e fira o webhook Make.
[triggers]
crons = ["*/5 * * * *"]
