name = "diaria-linkedin-cron"
main = "src/index.ts"
compatibility_date = "2026-01-01"
workers_dev = true

# KV namespace pra fila de posts agendados.
# Criar com: wrangler kv:namespace create LINKEDIN_QUEUE
# Cole o ID retornado abaixo:
[[kv_namespaces]]
binding = "LINKEDIN_QUEUE"
id = "4d6bb6a2bc864ea29dc15c2083806b2e"

# #1168 — Durable Object pra alarms por item (substitui cron polling).
# 1 instância por item de fila: idFromName(queueKey).
# Disparo preciso em scheduled_at (lag ~zero vs ~5min do cron).
# O cron (*/5) permanece como FALLBACK durante a transição e pra itens
# que não tiveram DO alarm armado (legacy KV pré-deploy).
#
# Pós-deploy: editor deve chamar POST /rearm (auth: X-Diaria-Token)
# pra re-armar alarms DOS pra todos os items KV legacy pendentes.
# Sem isso, items pré-deploy continuam dependendo do cron fallback.
[[durable_objects.bindings]]
name = "LINKEDIN_SCHEDULER"
class_name = "LinkedInScheduler"

# Migration obrigatória para new_classes (#1168).
# Ao deploying pela primeira vez: wrangler deploy cria o namespace DO
# automaticamente. Não requer ação manual além do deploy + /rearm.
# NÃO deployar sem esta migration — causaria erro 1102 do CF
# ("No such binding" para DurableObjectNamespace).
[[migrations]]
tag = "v1-linkedin-scheduler"
# Free plan do Cloudflare exige DO com storage SQLite (new_sqlite_classes),
# não new_classes (KV-backed, só plano pago) — erro 10097 (#2236). state.storage
# API idêntico. NOTA: o DEPLOY-HOLD (#2235) foi resolvido pelo fix daquela mesma
# issue (commit b202dac9) e a issue está fechada — o worker já foi deployado
# várias vezes desde então (#2236, #1168 rearm, #3817/#3818 Instagram, #3903,
# confirmado de novo em #3944 Parte A, 260723). Comentário mantido só como
# histórico do porquê new_sqlite_classes (não new_classes) é obrigatório aqui.
new_sqlite_classes = ["LinkedInScheduler"]

# #3817 — canal Instagram (Graph API direta, sem Make). Secrets via
# `wrangler secret put INSTAGRAM_BUSINESS_ACCOUNT_ID` / `INSTAGRAM_ACCESS_TOKEN`
# (conta @diar.ia.br, token de página com escopo instagram_content_publish).
# Ausentes = itens channel="instagram" vão pra DLQ com motivo claro no disparo
# (mesmo padrão do MAKE_PIXEL_WEBHOOK_URL ausente — ver dispatch.ts).
#
# #3944 Parte B — canal Threads (Threads API oficial, sem Make). Secrets via
# `wrangler secret put THREADS_ACCESS_TOKEN` / `THREADS_USER_ID` (conta
# @diar.ia.br). Ausentes = itens channel="threads" vão pra DLQ com motivo
# claro no disparo — mesmo padrão do Instagram acima.
[vars]
INSTAGRAM_API_VERSION = "v25.0"
THREADS_API_VERSION = "v1.0"

# Cron trigger — a cada 5 minutos (FALLBACK após #1168).
# Histórico: PR #1167 mudou pra */3 como mitigação de lag observado no #1146
# (Cloudflare cron tem SLA "~5min" mas lagou 10-15min em 2026-05-12). Decisão
# 2026-05-12 (Pixel): voltar pra */5 pra preservar margem do KV list free-tier
# (1k/day): */3 = 480/day = ~50% do limite, próximo demais. */5 = 288/day = ~30%.
# Com #1168 (DO alarms), cron é apenas safety net — não o path primário.
# Workaround pra lag em edições críticas: POST /fire-now (auth).
# Ao disparar, lê itens com scheduled_at <= now e fira o webhook Make.
[triggers]
crons = ["*/5 * * * *"]
