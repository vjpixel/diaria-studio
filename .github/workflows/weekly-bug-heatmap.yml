name: Weekly Bug Heatmap

# #1014: regenera docs/bug-heatmap.md toda 6ª feira (após weekly-e2e)
# e commita se houver mudanças.

on:
  schedule:
    # Toda 6ª às 10h UTC = 7h BRT (1h após weekly-e2e às 9h UTC)
    - cron: '0 10 * * 5'
  workflow_dispatch:

jobs:
  heatmap:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Pra criar branch + commit
      issues: read
      pull-requests: write # Pra abrir PR
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate heatmap
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx tsx scripts/bug-heatmap.ts --out docs/bug-heatmap.md

      # #1465: branch protection bloqueia push direto pra master — abrimos PR.
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(heatmap): weekly regen (#1014)"
          title: "chore(heatmap): weekly regen ${{ github.run_id }}"
          body: |
            Regen automático semanal do `docs/bug-heatmap.md` (#1014).

            Mergear se o snapshot atualizado for útil; fechar sem merge caso
            contrário. Workflow não falha mais se não houver mudanças (ver #1465).
          branch: bot/heatmap-weekly-regen
          delete-branch: true
          add-paths: docs/bug-heatmap.md
          author: "diaria-bot <diaria-bot@noreply.github.com>"
          committer: "diaria-bot <diaria-bot@noreply.github.com>"
