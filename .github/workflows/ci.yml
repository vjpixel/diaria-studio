name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - name: Install brevo-dashboard worker deps
        working-directory: workers/brevo-dashboard
        run: npm ci
      - name: Typecheck brevo-dashboard worker (#3164)
        working-directory: workers/brevo-dashboard
        run: npx tsc -p tsconfig.json --noEmit
      - run: npm test
      - run: npm run smoke
      - name: Validate RSS feeds
        run: npm run validate-feeds
        continue-on-error: true
